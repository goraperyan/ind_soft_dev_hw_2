apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-agent
  namespace: logging-hw
spec:
  selector:
    matchLabels:
      app: log-agent
  template:
    metadata:
      labels:
        app: log-agent
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: log-agent
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: log-agent
          image: python:3.11-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - sh
            - -c
            - |
              python - <<'PY'
              import json
              import os
              import ssl
              import time
              import urllib.parse
              import urllib.request
              from datetime import datetime, timezone

              namespace_path = "/var/run/secrets/kubernetes.io/serviceaccount/namespace"
              token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
              ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              with open(namespace_path, "r", encoding="utf-8") as f:
                  namespace = f.read().strip()

              with open(token_path, "r", encoding="utf-8") as f:
                  token = f.read().strip()

              node_name = os.environ["NODE_NAME"]
              context = ssl.create_default_context(cafile=ca_path)

              def k8s_get(url):
                  req = urllib.request.Request(
                      url,
                      headers={"Authorization": f"Bearer {token}"}
                  )
                  with urllib.request.urlopen(req, context=context, timeout=10) as resp:
                      return json.load(resp)

              print(f"log-agent started on node {node_name}", flush=True)

              while True:
                  try:
                      selector = urllib.parse.quote("app=custom-app")
                      url = f"https://kubernetes.default.svc/api/v1/namespaces/{namespace}/pods?labelSelector={selector}"
                      data = k8s_get(url)

                      pods = []
                      for item in data.get("items", []):
                          if item.get("spec", {}).get("nodeName") != node_name:
                              continue
                          if item.get("status", {}).get("phase") != "Running":
                              continue

                          name = item.get("metadata", {}).get("name")
                          ip = item.get("status", {}).get("podIP")
                          if name and ip:
                              pods.append((name, ip))

                      if not pods:
                          print("No custom-app pods found on this node", flush=True)
                      else:
                          for name, ip in pods:
                              print(f"===== {datetime.now(timezone.utc).isoformat()} {name} {ip} =====", flush=True)
                              try:
                                  with urllib.request.urlopen(f"http://{ip}:8080/logs", timeout=5) as resp:
                                      content = resp.read().decode("utf-8", errors="replace").strip()
                                  if content:
                                      print(content, flush=True)
                                  else:
                                      print("(empty log)", flush=True)
                              except Exception as e:
                                  print(f"ERROR reading logs from {name} ({ip}): {e}", flush=True)

                  except Exception as e:
                      print(f"ERROR in log-agent loop: {e}", flush=True)

                  time.sleep(20)
              PY