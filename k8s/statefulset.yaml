apiVersion: v1
kind: Service
metadata:
  name: backup-store
  namespace: logging-hw
spec:
  clusterIP: None
  selector:
    app: backup-store
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backup-store
  namespace: logging-hw
spec:
  serviceName: backup-store
  replicas: 1
  selector:
    matchLabels:
      app: backup-store
  template:
    metadata:
      labels:
        app: backup-store
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: backup-store
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "backup-store is running"
              sleep infinity
          volumeMounts:
            - name: backup-data
              mountPath: /backup
      volumes:
        - name: backup-data
          emptyDir: {}